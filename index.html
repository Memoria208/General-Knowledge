<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CDL General Knowledge — Idaho Permit Test</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f5f4f0;--surface:#fff;--surface-2:#f0efe9;--border:#d8d6ce;--border-strong:#b0aea4;--text:#1a1a18;--text-2:#55544e;--text-muted:#8a8880;--accent:#1a5fb4;--accent-bg:#e6f1fb;--accent-border:#7fbce8;--accent-text:#0c447c;--success-bg:#eaf3de;--success-border:#7ec040;--success-text:#3b6d11;--danger-bg:#fcebeb;--danger-border:#e88888;--danger-text:#791f1f;--radius:8px}
@media(prefers-color-scheme:dark){:root{--bg:#1c1c1a;--surface:#2c2c2a;--surface-2:#252523;--border:#3a3a36;--border-strong:#56554e;--text:#e8e6de;--text-2:#b0aea4;--text-muted:#6a6860;--accent:#5ba0e0;--accent-bg:#0c2540;--accent-border:#1a5fb4;--accent-text:#85b7eb;--success-bg:#172808;--success-border:#3b6d11;--success-text:#97c459;--danger-bg:#2a0a0a;--danger-border:#791f1f;--danger-text:#f09595}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:16px;line-height:1.6}
.app{max-width:760px;margin:0 auto;padding:1.5rem 1rem 3rem}
.badge{display:inline-block;background:var(--accent-bg);color:var(--accent-text);font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;letter-spacing:.04em;margin-bottom:.4rem}
header{margin-bottom:1.5rem}
header h1{font-size:22px;font-weight:600}
header p{font-size:14px;color:var(--text-muted);margin-top:2px}
.nav{display:flex;gap:6px;margin-bottom:1.5rem;border-bottom:1px solid var(--border);padding-bottom:1rem;flex-wrap:wrap}
.nav-btn{padding:8px 16px;border:1px solid var(--border);border-radius:var(--radius);background:transparent;cursor:pointer;font-size:14px;color:var(--text-2);font-family:inherit;transition:background .15s}
.nav-btn:hover{background:var(--surface);border-color:var(--border-strong)}
.nav-btn.active{background:var(--surface);color:var(--text);border-color:var(--border-strong);font-weight:500}
.section{display:none}.section.active{display:block}
.progress-bar{height:4px;background:var(--surface-2);border-radius:2px;margin-bottom:1rem}
.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}
.controls{display:flex;align-items:center;gap:10px;margin-bottom:1rem;flex-wrap:wrap}
.filter-select{padding:7px 12px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);font-size:13px;color:var(--text);font-family:inherit;cursor:pointer}
.count-label{font-size:13px;color:var(--text-muted);margin-left:auto}
.card-wrap{perspective:1000px;height:230px;cursor:pointer;margin-bottom:1rem;user-select:none}
.card-inner{position:relative;width:100%;height:100%;transition:transform .5s;transform-style:preserve-3d}
.card-wrap.flipped .card-inner{transform:rotateY(180deg)}
.card-face{position:absolute;width:100%;height:100%;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:12px;border:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem;text-align:center}
.card-back{transform:rotateY(180deg);background:var(--accent-bg);border-color:var(--accent-border)}
.card-label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin-bottom:.6rem}
.card-q{font-size:17px;font-weight:500;line-height:1.5;color:var(--text);white-space:pre-wrap;text-align:left}
.card-a{font-size:14px;line-height:1.6;color:var(--text);white-space:pre-wrap;text-align:left}
.card-hint{font-size:12px;color:var(--text-muted);margin-top:.75rem}
.fc-status{display:flex;gap:6px;align-items:center;font-size:13px;color:var(--text-muted);margin-bottom:.6rem;flex-wrap:wrap}
.fc-pill{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500}
.fc-pill.know{background:var(--success-bg);color:var(--success-text);border:1px solid var(--success-border)}
.fc-pill.dontknow{background:var(--danger-bg);color:var(--danger-text);border:1px solid var(--danger-border)}
.fc-pill.unseen{background:var(--surface-2);color:var(--text-muted);border:1px solid var(--border)}
.fc-nav{display:flex;gap:6px;align-items:center;justify-content:center;flex-wrap:wrap;margin-top:.5rem}
.fc-btn{padding:8px 16px;border:1px solid var(--border-strong);border-radius:var(--radius);background:var(--surface);cursor:pointer;font-size:13px;color:var(--text);font-family:inherit;transition:background .15s}
.fc-btn:hover{background:var(--surface-2)}
.fc-btn.know-btn{border-color:var(--success-border);color:var(--success-text);background:var(--success-bg)}
.fc-btn.know-btn:hover{background:var(--success-bg);opacity:.85}
.fc-btn.dontknow-btn{border-color:var(--danger-border);color:var(--danger-text);background:var(--danger-bg)}
.fc-btn.dontknow-btn:hover{background:var(--danger-bg);opacity:.85}
.fc-round-end{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.5rem;text-align:center}
.fc-round-title{font-size:20px;font-weight:600;margin-bottom:.5rem}
.fc-round-sub{font-size:14px;color:var(--text-2);margin-bottom:1.25rem;line-height:1.6}
.fc-round-btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.fc-round-btn{padding:10px 22px;border:1px solid var(--border-strong);border-radius:var(--radius);background:var(--surface);cursor:pointer;font-size:14px;font-weight:500;font-family:inherit;color:var(--text);transition:background .15s}
.fc-round-btn:hover{background:var(--surface-2)}
.fc-round-btn.primary{border-color:var(--danger-border);background:var(--danger-bg);color:var(--danger-text)}
.fc-round-btn.primary:hover{opacity:.85}
.sg-toc{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px;margin-bottom:1.25rem}
.sg-toc-btn{padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);cursor:pointer;font-size:13px;text-align:left;color:var(--text);font-family:inherit;transition:background .15s}
.sg-toc-btn:hover{background:var(--surface-2);border-color:var(--border-strong)}
.sg-toc-btn.active{border-color:var(--accent-border);background:var(--accent-bg);color:var(--accent-text);font-weight:500}
.sg-content{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.25rem}
.sg-title{font-size:18px;font-weight:600;margin-bottom:1rem}
.sg-item{border-bottom:1px solid var(--border);padding:.85rem 0}
.sg-item:last-child{border-bottom:none}
.sg-key{display:inline-block;background:var(--accent-bg);color:var(--accent-text);font-size:11px;padding:2px 8px;border-radius:4px;margin-bottom:.4rem;font-weight:500}
.sg-q{font-size:14px;font-weight:500;margin-bottom:.35rem}
.sg-a{font-size:14px;color:var(--text-2);line-height:1.65}
.quiz-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem}
.quiz-meta{font-size:13px;color:var(--text-muted)}
.quiz-question{font-size:17px;font-weight:500;line-height:1.55;margin-bottom:1.25rem}
.quiz-opts{display:flex;flex-direction:column;gap:8px;margin-bottom:1rem}
.quiz-opt{padding:12px 16px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);cursor:pointer;font-size:14px;text-align:left;color:var(--text);font-family:inherit;line-height:1.5;transition:border-color .15s,background .15s}
.quiz-opt:hover:not(:disabled){border-color:var(--border-strong);background:var(--surface-2)}
.quiz-opt.correct{border-color:var(--success-border);background:var(--success-bg);color:var(--success-text);font-weight:500}
.quiz-opt.wrong{border-color:var(--danger-border);background:var(--danger-bg);color:var(--danger-text)}
.quiz-opt:disabled{cursor:default}
.quiz-explain{font-size:13px;color:var(--text-2);background:var(--surface-2);border-radius:var(--radius);padding:10px 14px;margin-bottom:1rem;border-left:3px solid var(--accent);line-height:1.65;display:none}
.quiz-next{padding:10px 24px;border:1px solid var(--border-strong);border-radius:var(--radius);background:var(--surface);cursor:pointer;font-size:14px;font-weight:500;color:var(--text);font-family:inherit;display:none;transition:background .15s}
.quiz-next:hover{background:var(--surface-2)}
.quiz-result{text-align:center;padding:2.5rem 1rem}
.quiz-big-score{font-size:64px;font-weight:700;line-height:1}
.quiz-result-label{font-size:15px;color:var(--text-2);margin:.5rem 0 1.5rem}
.quiz-restart{padding:10px 28px;border:1px solid var(--border-strong);border-radius:var(--radius);background:var(--surface);cursor:pointer;font-size:14px;font-weight:500;font-family:inherit;color:var(--text);transition:background .15s}
.quiz-restart:hover{background:var(--surface-2)}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="badge">Test 1 of 4 &mdash; 50 questions, need 40 to pass</div>
    <h1>General Knowledge</h1>
    <p>Idaho CDL Permit Test &mdash; Basic vehicle control, weight &amp; cargo, extreme conditions, emergency procedures, CDL rules</p>
  </header>
  <nav class="nav">
    <button class="nav-btn active" onclick="switchTab('fc')">Flashcards</button>
    <button class="nav-btn" onclick="switchTab('sg')">Study guide</button>
    <button class="nav-btn" onclick="switchTab('qz')">Practice quiz</button>
  </nav>
  <div id="sec-fc" class="section active">
    <div class="controls">
      <select class="filter-select" id="fc-cat" onchange="fcFilter()">
        <option value="all">All topics</option>
        <option value="control">Basic vehicle control</option>
        <option value="weight">Weight &amp; cargo</option>
        <option value="conditions">Extreme conditions</option>
        <option value="emergency">Emergency procedures</option>
        <option value="rules">CDL rules</option>
        <option value="hazmat">Hazmat basics</option>
      </select>
      <span class="count-label" id="fc-count"></span>
    </div>
          <div class="fc-status">
        <span id="fc-know-pill" class="fc-pill know">&#10003; <span id="fc-know-n">0</span> know</span>
        <span id="fc-dontknow-pill" class="fc-pill dontknow">&#10007; <span id="fc-dontknow-n">0</span> don't know</span>
        <span id="fc-unseen-pill" class="fc-pill unseen">&#9900; <span id="fc-unseen-n">0</span> unseen</span>
        <span class="count-label" id="fc-count" style="margin-left:auto"></span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="fc-prog"></div></div>
      <div class="card-wrap" id="fc-card" onclick="flipCard()">
        <div class="card-inner">
          <div class="card-face"><div class="card-label">Question</div><div class="card-q" id="fc-q"></div><div class="card-hint">Click to reveal answer</div></div>
          <div class="card-face card-back"><div class="card-label">Answer</div><div class="card-a" id="fc-a"></div></div>
        </div>
      </div>
      <div id="fc-vote-row" style="display:flex;justify-content:center;gap:10px;margin-bottom:.75rem">
        <button class="fc-btn dontknow-btn" onclick="vote(false)">&#10007; Don't know</button>
        <button class="fc-btn know-btn" onclick="vote(true)">&#10003; Know it</button>
      </div>
      <div id="fc-round-end" class="fc-round-end" style="display:none"></div>
      <div class="fc-nav" id="fc-nav-row">
        <button class="fc-btn" onclick="fcMove(-1)">&larr; Prev</button>
        <button class="fc-btn" onclick="fcShuffle()">&#8646; Shuffle</button>
        <button class="fc-btn" onclick="resetDeck()">&#8635; Reset</button>
        <button class="fc-btn" onclick="fcMove(1)">Next &rarr;</button>
      </div>
  </div>
  <div id="sec-sg" class="section"><div class="sg-toc" id="sg-toc"></div><div class="sg-content" id="sg-content"></div></div>
  <div id="sec-qz" class="section">
    <div class="controls" style="margin-bottom:1rem">
      <select class="filter-select" id="qz-cat" onchange="qzStart()">
        <option value="all">All topics &mdash; 20 questions</option>
        <option value="control">Basic vehicle control</option>
        <option value="weight">Weight &amp; cargo</option>
        <option value="conditions">Extreme conditions</option>
        <option value="emergency">Emergency procedures</option>
        <option value="rules">CDL rules</option>
        <option value="hazmat">Hazmat basics</option>
      </select>
    </div>
    <div id="qz-area"></div>
  </div>
</div>
<script>
const CARDS=[
  {cat:"gk",q:"Is it legal to drive with one-fourth of a vehicle's leaf springs broken or missing?\n\nA. Yes\nB. No\nC. It doesn't make any difference if you drive slowly",a:"No — One-fourth or more missing puts the vehicle out of service. Any defect in the leaf spring could be dangerous."},
  {cat:"gk",q:"The distance you should scan ahead in a congested area is about?\n\nA. 32 feet\nB. One block\nC. Two vehicle lengths ahead",a:"One block — Good drivers look 12-15 seconds ahead. At lower speeds that's about one block; at highway speeds it's about a quarter mile."},
  {cat:"gk",q:"A vehicle is loaded with very little weight on the drive axle. What may result?\n\nA. Poor traction\nB. A need to disconnect the steering axle brakes\nC. Damage to drive axle tires\nD. Better handling",a:"Poor traction — Too little weight on the driving axles can cause poor traction. The drive wheels may spin easily."},
  {cat:"gk",q:"Truck escape ramps:\n\nA. Are designed to protect vehicles from damage\nB. Should not be used unless you have first tried all other ways\nC. Cannot be used by certain types of heavy vehicles",a:"Are designed to protect vehicles from damage — Escape ramps stop runaway vehicles safely without injuring drivers and passengers. Use one any time brakes fail on a downgrade. No penalty for using one."},
  {cat:"gk",q:"What effects can wet brakes cause?\n\nA. Brakes can grab or become weak\nB. Brakes can work better\nC. Your foot can get tired",a:"Brakes can grab or become weak — Water causes brakes to be weak, apply unevenly, or grab. This can cause lack of braking power, wheel lockups, pulling to one side, and jackknife."},
  {cat:"gk",q:"During pre-trip inspection, make sure that the ___ are secured against snagging, rubbing, or wearing.\n\nA. Primary and secondary safety cab locks\nB. Frame and cross members\nC. Air lines and electrical wiring",a:"Air lines and electrical wiring — Air lines and electrical wiring must be secured against snagging, rubbing, and wearing."},
  {cat:"gk",q:"You have no Hazardous Materials Endorsement. You can drive a vehicle hauling hazardous materials when:\n\nA. Someone with the endorsement rides with you\nB. The vehicle does not require placards\nC. The cargo is transported less than 100 miles",a:"The vehicle does not require placards — You can haul hazmat without the endorsement only if the vehicle does not require placards. If placards are required, you must have the endorsement."},
  {cat:"gk",q:"Which railroad crossing violations can lead to loss of your CDL for at least 60 days?\n\nA. Not having sufficient space to drive all the way through without stopping\nB. Getting stuck on the tracks because of insufficient clearance\nC. Both of the above",a:"Both of the above — Both failing to have sufficient space to drive completely through without stopping AND failing to negotiate a crossing due to insufficient clearance are among the six violations that cost you at least 60 days."},
  {cat:"gk",q:"When should you check your mirrors for a lane change?\n\nA. Before and after signaling the change\nB. After starting and after completing the lane change\nC. Both of the above",a:"Both of the above — Check mirrors: before the change, after signaling, right after starting the change, and after completing the change."},
  {cat:"gk",q:"On which fires can you use the ABC fire extinguisher?\n\nA. Electrical fires\nB. Burning tires or cloth\nC. Both of the above",a:"Both of the above — The ABC type works on electrical fires, burning liquids, wood, paper, and cloth."},
  {cat:"gk",q:"Which of these tells you that cargo contains hazardous materials?\n\nA. A hazardous materials placard is on the vehicle\nB. A four-inch diamond-shaped label is on the container\nC. Both of these answers are correct",a:"Both of these answers are correct — Both placards on the vehicle and diamond-shaped labels on containers indicate hazardous materials."},
  {cat:"gk",q:"Which of these statements about speed management is true?\n\nA. On packed snow, reduce speed by about 1/2\nB. On a wet road, reduce speed by about 1/3\nC. Both of the above are true",a:"Both of the above are true — Wet roads: reduce by 1/3 (55 to 35 mph). Packed snow: reduce by half or more. Ice: reduce to a crawl."},
  {cat:"gk",q:"Which of these is NOT required knowledge for drivers needing a HAZMAT endorsement?\n\nA. When to use placards\nB. Basic chemistry\nC. Which products can be loaded together",a:"Basic chemistry — Hazmat drivers must know when to use placards and which products can be loaded together. Basic chemistry is not a required knowledge area."},
  {cat:"gk",q:"Which of these statements is true about medicines used to treat the common cold?\n\nA. Should only be used when driving during the daytime\nB. Can be used while driving as long as you take half the regular dose\nC. They often make you sleepy and should not be used while driving",a:"They often make you sleepy and should not be used while driving — Many over-the-counter cold medicines may make the driver drowsy or otherwise affect safe driving ability."},
  {cat:"gk",q:"Which of these statements is true about other drivers?\n\nA. Short-term rental truck drivers are often not used to the limited vision and pose a hazard\nB. Mail or delivery truck drivers do not pose a hazard\nC. Drivers using turn signals can be trusted to turn in the direction indicated",a:"Short-term rental truck drivers are often not used to the limited vision and pose a hazard — Rental truck drivers are often not used to the limited vision to the sides and rear of the truck."},
  {cat:"gk",q:"Which of these statements is NOT true about engine belts in hot weather?\n\nA. Cracking is likely to occur, but it is not a safety threat\nB. Loose belts will not turn the water pump and/or fan properly\nC. You can check belt tightness by pressing on them",a:"Cracking is likely to occur, but it is not a safety threat — FALSE. Cracking IS a safety threat. Check belts for cracking or other signs of wear and replace them."},
  {cat:"gk",q:"Which is true about warning other drivers of a stopped vehicle?\n\nA. Keep the vehicle's taillights on to warn other drivers\nB. Move the rear reflective triangle back if driver vision is obscured to within 500 feet\nC. Put out your emergency warning devices within five minutes",a:"Move the rear reflective triangle back if driver vision is obscured to within 500 feet — If a hill or curve blocks the view, move the rear-most triangle back down the road so warning is provided."},
  {cat:"gk",q:"Which is NOT a good rule when caring for the injured at an accident scene?\n\nA. Move severely injured persons if there is danger due to fire or passing traffic\nB. If a qualified person is helping, stay out of the way unless asked to assist\nC. Allow injured persons to become chilled or overheated",a:"Allow injured persons to become chilled or overheated — WRONG. Keep the injured person warm. Do not move a severely injured person unless there is danger of fire or passing traffic."},
  {cat:"gk",q:"Which of the following statements is true?\n\nA. Many heavy vehicle accidents occur between midnight and 6 a.m.\nB. Most hazards are more easily seen at night than during the day\nC. Most people are more alert at night than during the day",a:"Many heavy vehicle accidents occur between midnight and 6 a.m. — Schedule trips for hours you are normally awake when possible. Most people are LESS alert at night."},
  {cat:"gk",q:"Which of these statements is NOT true about bad weather driving conditions?\n\nA. When temperature drops, bridges will freeze before roadways\nB. Driving becomes more dangerous as temperature rises to the point where ice begins to melt\nC. As rain continues, the road becomes more slippery than when rain began",a:"As rain continues, the road becomes MORE slippery — FALSE. As rain continues it washes oil away and traction improves. The road is most slippery just after rain begins."},
  {cat:"gk",q:"What does 'axle weight' mean?\n\nA. The weight transmitted to the ground by one axle or one set of axles\nB. The weight transmitted to the tires from the axle\nC. Both of the above",a:"The weight transmitted to the ground by one axle or one set of axles — Axle weight is specifically the weight transmitted from one axle or a set of axles to the ground."},
  {cat:"gk",q:"With a BAC of _____, most people lose consciousness, and some die.\n\nA. 0.16\nB. 0.1\nC. 0.4",a:"0.4 — At a BAC of .40, most people will lose consciousness and some will die. At .08 driving is legally impaired; at .04 a CDL driver is disqualified."},
  {cat:"gk",q:"Loads that are over-length, over-width, or overweight may require:\n\nA. Flashing lights\nB. Driving limited to certain times\nC. Both of the above",a:"Both of the above — Oversized loads require special permits, may be limited to certain hours, need special equipment (wide load signs, flags, lights), and may need a police escort."},
  {cat:"gk",q:"When getting in to start the engine and inspect inside the cab, you must:\n\nA. Start the engine and listen for unusual noises\nB. Make sure the parking brake is on and put the gearshift in neutral (or park if automatic)\nC. Both of the above",a:"Both of the above — Before starting: confirm parking brake is on and gearshift is in neutral or Park. Then start engine and listen for unusual noises."},
  {cat:"gk",q:"Which of these is NOT something you should do if your headlights are not working properly?\n\nA. Adjust the headlights\nB. Leave your high beams on\nC. Clean the headlights",a:"Leave your high beams on — High beams blind other drivers and must not be left on permanently. Fix headlights properly. Use high beams only when not within 500 feet of another vehicle."},
  {cat:"gk",q:"Name some suspension system defects.\n\nA. Leaking shock absorbers\nB. Broken leaves in a leaf spring and a cracked or broken spring hanger\nC. Both of the above",a:"Both of the above — Leaking shock absorbers and broken or missing leaves in leaf springs are common suspension defects. Also watch for cracked spring hangers and missing U-bolts."},
  {cat:"gk",q:"What is the safest way to use turn signals when you intend to turn?\n\nA. Signal well in advance of the turn\nB. Signal continuously up through the turn\nC. Do both of the above",a:"Do both of the above — Signal early, signal continuously throughout the turn, and cancel your signal after the turn is completed."},
  {cat:"gk",q:"Which of these is especially true about your tires in hot weather?\n\nA. You should bleed a small amount of air to keep tire pressure steady\nB. You should check tire mounting and air pressure before driving\nC. If a tire is too hot to touch, hose it down with water",a:"You should check tire mounting and air pressure before driving — Check pressure every 2 hours or 100 miles in hot weather. Do NOT let air out. If a tire is too hot to touch, stop and wait until it cools."},
  {cat:"gk",q:"What should you do if a car coming toward you at night keeps its high beams on?\n\nA. Look toward the right edge of your lane or the right edge of the road\nB. Flash your high beams at the other driver\nC. Slow down and look straight ahead in your lane",a:"Look toward the right edge of your lane or the right edge of the road — Do not look directly at bright lights. Look at the right side of the road. Do not retaliate with your own high beams."},
  {cat:"gk",q:"When driving in cold weather, your tires must:\n\nA. Have at least 4/32-inch tread depth\nB. Have at least 6/32-inch tread depth\nC. Provide enough traction to steer and push the vehicle through snow",a:"Provide enough traction to steer and push the vehicle through snow — Drive tires must push the rig through snow; steering tires must have traction to steer. More tread is better in winter conditions."},
  {cat:"gk",q:"When driving with few streetlights on a clear night and you cannot see well, you should:\n\nA. Find another route that is better lit\nB. Turn your interior lights on\nC. Use your high beams when legal and keep your interior lights off",a:"Use your high beams when legal and keep your interior lights off — Use high beams when safe and legal (not within 500 feet of another vehicle). Interior lights reduce your ability to see outside."},
  {cat:"gk",q:"When a doctor prescribes medication and you know you will be driving, you should:\n\nA. Take the medication plus other medications to stay alert\nB. Ask the doctor if the medication will affect your ability to drive\nC. Take the medication but stop if you notice it affecting your driving",a:"Ask the doctor if the medication will affect your ability to drive — A driver may use prescription medication if the doctor confirms it will not affect safe driving ability."},
  {cat:"gk",q:"What does 'communicating' mean in safe driving?\n\nA. Using hand signals\nB. Driving brightly colored vehicles\nC. Letting other drivers know you are there",a:"Letting other drivers know you are there — Communicate by signaling your intentions, using your horn when needed, using lights, and making sure other drivers are aware of your presence."},
  {cat:"gk",q:"What is the proper way to hold the steering wheel?\n\nA. With your right hand on the wheel\nB. Firmly, with one hand at the top and the other at the bottom\nC. Firmly, with both hands on opposite sides of the wheel",a:"Firmly, with both hands on opposite sides of the wheel — If you hit a curb or pothole, the wheel could pull away from your hands unless you have a firm grip with both hands on opposite sides."},
  {cat:"gk",q:"When inspecting mirrors and windshields for cracks, dirt, and obstructions, you should:\n\nA. Not worry about any of it\nB. Look in the mirror to see if you look good\nC. Clean and adjust as necessary",a:"Clean and adjust as necessary — Inspect mirrors and windshield for cracks, dirt, illegal stickers, or other obstructions to seeing clearly. Clean and adjust as necessary."},
  {cat:"gk",q:"When passing another vehicle, pedestrian, or bicyclist, you should assume they:\n\nA. See you\nB. May move into your traffic lane\nC. Will move out of your lane of traffic",a:"May move into your traffic lane — Assume they do not see you and could suddenly move in front of you. Tap horn lightly or flash lights at night. Drive carefully enough to avoid a crash even if they do not react."},
  {cat:"gk",q:"If you must stop on a road or shoulder, you must put out your emergency warning devices within:\n\nA. Five minutes\nB. Fifteen minutes\nC. Ten minutes",a:"Ten minutes — You must place emergency warning devices within ten minutes of stopping on a road or shoulder."},
  {cat:"gk",q:"Which of these statements is true about trucks, buses, laws and restrictions?\n\nA. Federal regulations apply only to trucks driven at least 50 miles on a trip\nB. Laws and restrictions can vary from place to place\nC. County and city laws do not apply to trucks in interstate commerce",a:"Laws and restrictions can vary from place to place — Be familiar with the laws in the states you drive in. Regulations covering vehicle weight, cargo, and routes can vary from one jurisdiction to another."},
  {cat:"gk",q:"To prevent brake fade, you should:\n\nA. Coast down hills that are not very steep\nB. Apply constant hard pressure on the brakes\nC. Select a gear that will keep your vehicle at a safe speed on steep downgrades",a:"Select a gear that will keep your vehicle at a safe speed on steep downgrades — Use engine braking as the primary control. Select the correct low gear BEFORE starting down. Brakes are a supplement only."},
  {cat:"gk",q:"You are driving a new truck with a manual transmission on a long steep downhill grade:\n\nA. Use a lower gear than you would use to climb the hill\nB. Use the same gear you would use to climb the hill\nC. Shift into neutral and coast",a:"Use a lower gear than you would use to climb the hill — Modern trucks have low-friction parts and more powerful engines. They can climb in higher gears but may need lower gears going down than going up."},
  {cat:"gk",q:"Which of the following is true about a vehicle with a high center of gravity?\n\nA. The cargo should be rearranged so heaviest parts are under the lightest parts\nB. The vehicle is less likely to tip over\nC. The vehicle is less dangerous on curves",a:"The cargo should be rearranged so heaviest parts are under the lightest parts — A high center of gravity makes the vehicle MORE likely to tip over. Load cargo as low as possible with heaviest items on the bottom."},
  {cat:"gk",q:"One can recognize hazardous materials by looking at the container's:\n\nA. Shape\nB. Color\nC. Label",a:"Label — Look for the four-inch diamond-shaped hazardous materials label on the container. Proper shipping name, identification number, label, and placards must all be correct."},
  {cat:"gk",q:"Optional safety equipment may include emergency phone numbers, tire chains, and:\n\nA. Warning devices\nB. A charged fire extinguisher\nC. Tire changing equipment",a:"Tire changing equipment — Optional items include chains, tire changing equipment, emergency phone numbers, and an accident reporting kit. Warning devices and a fire extinguisher are REQUIRED, not optional."},
  {cat:"gk",q:"The best way to stop all skids is to:\n\nA. Use stab or controlled braking\nB. Counter steer and accelerate\nC. Restore traction to the tires",a:"Restore traction to the tires — When any vehicle starts to skid, you must act to restore traction to the wheels. Everything else (releasing brakes, easing off accelerator) serves that goal."},
  {cat:"gk",q:"If your brakes get wet on a rainy day, what can result?\n\nA. Reduced braking power\nB. Excessive brake wear\nC. Hydroplaning",a:"Reduced braking power — Wet brakes can be weak, apply unevenly, or grab. This can cause lack of braking power, wheel lockups, pulling to one side, and jackknife if you pull a trailer."},
  {cat:"gk",q:"Implied consent means that when you operate a CMV on public roads, you:\n\nA. Consent to be tested for alcohol in your blood\nB. Understand that you may now drink alcohol before driving\nC. Consent to have your vehicle inspected for alcohol",a:"Consent to be tested for alcohol in your blood — If you operate a CMV, you are deemed to have given your consent to alcohol testing."},
  {cat:"gk",q:"It takes the body about _____ hours to get rid of the alcohol in four drinks.\n\nA. 6\nB. 2\nC. 4",a:"4 — The liver processes about one-third of an ounce of alcohol per hour. Four standard drinks take approximately 4 hours to process. Only time sobers you up."},
  {cat:"gk",q:"Heavy vehicles must sometimes travel more slowly than other traffic. Which is NOT a good rule to follow?\n\nA. Turn on your flashers if it is legal to do so\nB. Stay to the right\nC. Signal other drivers when it is safe for them to pass you",a:"Signal other drivers when it is safe for them to pass you — Do NOT do this. You could cause an accident and be blamed. Stay right and use flashers instead."}
];

const GUIDE={
  control:{title:'Basic vehicle control',items:[
    {k:'Seeing ahead',q:'How far ahead and what should you look for?',a:'Look 12-15 seconds ahead (one block in city, quarter mile on highway). Look for braking vehicles, vehicles entering from side streets, traffic lights turning red, and other hazards. Shift attention back and forth between near and far. Use mirrors regularly - check every 8-10 seconds. Check more during lane changes, turns, and merges.'},
    {k:'Following distance',q:'How do you calculate required following distance?',a:'1 second per 10 feet of vehicle length at speeds under 40 mph. Add 1 second for speeds over 40 mph. Count seconds as the vehicle ahead passes a landmark: "one-thousand-one, one-thousand-two..." Example: 60-foot truck at 55 mph needs 7 seconds. Double this or more on slippery roads.'},
    {k:'Backing safely',q:'What are the rules for backing?',a:'Avoid whenever possible - park so you can pull forward when leaving. If you must back: get out and walk around to check your path first. Use mirrors on both sides. Back toward driver\'s side. Use lowest reverse gear. Use a helper when available and agree on a stop signal before starting. Get out and re-check if unsure.'},
    {k:'Shifting gears',q:'When should you downshift - the two special conditions?',a:'(1) Before starting down a long steep hill: select a low enough gear BEFORE you start. The gear should be low enough to control speed without hard braking. Usually lower than the gear needed to climb the same hill. (2) Before entering a curve: slow to safe speed, downshift so you can accelerate slightly through the curve for better stability and control.'},
    {k:'Pre-trip inspection',q:'What is the seven-step inspection and key items to check?',a:'Step 1: Vehicle overview - look for damage, leaks, vehicle leaning. Step 2: Engine compartment - fluids, belts, hoses, leaks. Step 3: Start engine, inspect cab - gauges, controls, mirrors, emergency equipment. Step 4: Turn off engine, check lights. Step 5: Walk-around - all sides. Step 6: Check turn signal lights. Step 7: Start engine, test parking brake and service brakes.'},
    {k:'Communicating',q:'How do you communicate your presence and intentions?',a:'Signal early and continuously for turns (both hands needed - do not cancel until turn is complete). Tap brake lights to warn following drivers of slowing. Use 4-way flashers when driving very slowly or stopped. Place warning devices within 10 minutes if stopped. When passing: tap horn lightly or flash lights at night. Never signal other drivers to pass - you could cause a crash.'},
  ]},
  weight:{title:'Weight distribution and cargo',items:[
    {k:'Weight limits',q:'What are the key weight definitions?',a:'GVWR: manufacturer\'s maximum loaded weight for a single vehicle. GCWR: max loaded weight of power unit plus all towed units. Axle weight: weight transmitted to ground by one axle or set of axles. Tire load: maximum safe weight a tire can carry at specified pressure. All must stay within legal limits - overloading affects steering, braking, and speed control.'},
    {k:'Balance',q:'Why does weight balance matter and how should cargo be loaded?',a:'Too much front weight: hard steering, axle and tire damage. Too little front weight: front axle too light to steer safely. Too little on drive axles: poor traction, may spin in bad weather. High center of gravity: rollover risk in curves and swerves. Best practice: load cargo as low as possible, put heaviest cargo under lighter cargo, keep weight centered.'},
    {k:'Securing cargo',q:'What are the cargo tie-down requirements?',a:'Aggregate working load limit of securement system must be at least half the weight of the cargo. Minimum one tie-down per 10 feet of cargo length. Absolute minimum of two tie-downs for any load regardless of size. Use proper equipment: ropes, straps, chains with tensioning devices (winches, ratchets). Must be attached to vehicle correctly at proper anchor points.'},
    {k:'Inspection schedule',q:'When must you inspect cargo during a trip?',a:'Before starting: verify cargo is not overloaded and is balanced and secured. After first 50 miles: inspect cargo and securement devices again. Then every 3 hours or 150 miles (whichever comes first). After every break during driving. Report any problems. Check that cargo does not block your view or access to emergency equipment.'},
    {k:'Special cargo',q:'What special cargo types need extra care?',a:'Dry bulk tanks: high center of gravity, load can shift - slow and careful in curves and sharp turns. Hanging meat (refrigerated trailers): very high and unstable center of gravity - extra caution on ramps and curves. Livestock: can move and lean in curves, shifting center of gravity - may need false bulkheads. Oversized loads: require permits, may be limited to certain hours, may need escort vehicles.'},
  ]},
  conditions:{title:'Extreme driving conditions',items:[
    {k:'Slippery roads',q:'How do you adjust speed for road conditions?',a:'Wet roads: reduce by about 1/3 (55 mph to 35 mph) - wet roads double stopping distance. Packed snow: reduce by half or more. Ice: reduce to a crawl and stop driving as soon as safely possible. Bridges and shaded areas ice before the open road. Watch for black ice - road looks wet but is actually frozen at temperatures near or below 32 degrees.'},
    {k:'Hydroplaning',q:'What is hydroplaning and how do you prevent and recover from it?',a:'Tires lose contact with road by riding on a film of water. Occurs at 30+ mph on standing water - more likely with worn tires or low tire pressure. Prevention: maintain proper tire pressure and tread depth, slow down on wet roads, watch for standing water reflections. Recovery: release accelerator - do NOT brake. Push in clutch if drive wheels are skidding. Let vehicle slow on its own.'},
    {k:'Night driving',q:'What are the night driving rules and risks?',a:'Low beams: about 250 ft visibility. High beams: 350-500 ft. Dim within 500 ft of oncoming vehicles or 500 ft when following another vehicle. Do not look directly at oncoming lights - look at the right edge. Do not use high beams in fog - they reflect back. Keep windshield and mirrors clean inside and out - dirt causes severe glare at night.'},
    {k:'Mountain driving',q:'How do you select a safe speed on a downgrade?',a:'Consider: total vehicle and cargo weight, length of the grade, steepness of the grade, road conditions, weather. Never exceed posted maximum safe speed signs. Engine braking is the PRIMARY control - select low gear BEFORE starting down. Brakes are a SUPPLEMENT only - use the apply/release technique (drop 5 mph below safe speed, release, repeat). Never let brakes overheat.'},
    {k:'Hot weather',q:'What are the hot weather vehicle checks and driving concerns?',a:'Check tire pressure every 2 hours or 100 miles - pressure increases with heat, but do NOT release air. Stop if a tire is too hot to touch and wait until it cools. Monitor coolant temperature gauge while driving - if it goes above safe range, stop safely. Never remove radiator cap when hot. Watch for tar bleeding onto road surface - very slippery.'},
    {k:'Wet brakes',q:'How do you handle wet brakes?',a:'Wet brakes can be weak, apply unevenly, or grab, causing wheel lockup or pulling to one side. If you must drive through deep water: slow down, use low gear, apply brakes gently while crossing to press linings against drums and keep water out. After crossing: continue with light brake pressure for a short distance to dry them. Make a test stop when safe to confirm brakes are working correctly.'},
  ]},
  emergency:{title:'Emergency procedures',items:[
    {k:'Steering emergencies',q:'When and how do you steer around an obstacle?',a:'When there is not enough room to stop but there IS room to steer around - you can almost always steer faster than you can stop. Keep both hands on the wheel. Do NOT apply brakes while turning (can lock wheels and cause skid). Turn only as far as needed to clear the obstacle. Immediately counter-steer once past - think of it as one combined steer/counter-steer movement. Be prepared before you turn.'},
    {k:'Emergency stops',q:'What are controlled braking and stab braking?',a:'Controlled braking: apply brakes as hard as possible without locking the wheels. Keep steering adjustments minimal. If wheels lock or you need to steer sharply: release and immediately reapply. Stab braking: apply fully, release when wheels lock, wait up to 1 second for wheels to start rolling, then apply fully again. Never jam brakes to the floor and hold - locked wheels mean zero control.'},
    {k:'Brake failure',q:'What are the steps when hydraulic brakes fail?',a:'1) Downshift immediately to use engine braking. 2) Pump the brakes - may generate enough hydraulic pressure to stop. 3) Use the parking/emergency brake carefully while pressing the release button to control pressure and prevent wheel lockup. 4) Look for an escape route: open field, uphill side road, or escape ramp. If heading uphill, gravity will help slow you. Make the move early - the faster you go, the harder it gets.'},
    {k:'Tire failure',q:'How do you respond to a tire blowout?',a:'GRIP the steering wheel firmly with both hands - a front blowout can rip the wheel from your hands. STAY OFF the brake until the vehicle has slowed significantly - braking immediately after a blowout can cause loss of control. Then brake very gently and pull off the road. After stopping: get out and check ALL tires - dual rear tires can mask a flat and you may not feel it until you look.'},
    {k:'Accident scene',q:'What are the steps at an accident scene?',a:'Step 1 - Protect: if your vehicle is involved, move it to the side of road. If stopping to help, park away from the scene. Put on flashers. Set out reflective triangles in time for other drivers to see them. Step 2 - Notify: use cell phone or CB to call police before getting out if possible. Give exact location. Step 3 - Care: do not move severely injured people unless there is a fire risk. Stop heavy bleeding with direct pressure. Keep injured person warm.'},
    {k:'Vehicle fires',q:'What are the fire prevention and response procedures?',a:'Prevention: inspect electrical, fuel, and exhaust systems before trips. Check tires and wheels at stops. Check gauges for overheating. Do not smoke near flammables. Response: Pull off road away from buildings and other vehicles - NEVER pull into a service station. Notify emergency services. For engine fire: turn off engine, do not open hood, shoot foam through louvers. For cargo fire in van: keep doors CLOSED - opening supplies oxygen. Aim extinguisher at the base of the fire. Position yourself upwind.'},
  ]},
  rules:{title:'CDL rules and disqualifications',items:[
    {k:'CDL classes',q:'What are the three CDL classes and what vehicles do they cover?',a:'Class A: any combination over 26,001 lb GCWR where the towed unit exceeds 10,000 lb GVWR - tractor-trailers, truck and trailer combinations. Class B: single vehicle over 26,001 lb GVWR, may tow a vehicle not exceeding 10,000 lb - straight trucks, large buses, dump trucks. Class C: under 26,001 lb carrying hazmat requiring placards OR designed to transport 16 or more passengers including the driver.'},
    {k:'Disqualifications',q:'What are the major CDL disqualifying offenses?',a:'First offense (minimum 1-year loss): DUI at .04%+, refusing alcohol test, leaving accident scene in CMV, committing a felony using a CMV, driving while CDL is suspended, causing a fatality through negligent CMV operation. If hazmat vehicle: 3-year minimum. Second offense: lifetime ban. Using a CMV to commit a controlled substance felony: lifetime ban regardless.'},
    {k:'Serious violations',q:'What counts as a serious traffic violation for CDL purposes?',a:'Speeding 15 or more mph over the posted limit. Reckless driving. Improper or erratic lane changes. Following too closely. Traffic violations connected to fatal traffic accidents. Driving a CMV without obtaining a CDL. Driving without the CDL in your possession. Driving without the proper CDL class or endorsements for the vehicle or cargo type.'},
    {k:'Key CDL rules',q:'What are the other major CDL rules drivers must follow?',a:'Only ONE license allowed - fine up to $5,000 or jail. Notify employer within 30 days of any traffic conviction (except parking). Notify employer within 2 business days if license is suspended, revoked, or canceled. No texting while driving a CMV - disqualification after two convictions. No hand-held cell phone use while driving. Safety belt required at all times. Give employer all driving jobs held for past 10 years when applying.'},
    {k:'Out-of-service',q:'What are the penalties for out-of-service and railroad crossing violations?',a:'Out-of-service orders: first violation = at least 90 days. Two violations in 10 years = at least 1 year. Three or more in 10 years = at least 3 years. Railroad crossing violations: first offense = at least 60 days CDL suspension. Second offense within 3 years = at least 120 days. Third offense within 3 years = at least 1 year.'},
  ]},
  hazmat:{title:'Hazmat basics (all drivers)',items:[
    {k:'Who needs endorsement',q:'When do you need a hazmat endorsement?',a:'Any time you drive a vehicle carrying hazardous materials in quantities requiring placards, OR materials listed as select agents or toxins under 42 CFR part 73. You can drive a vehicle with hazmat that does NOT require placards without the endorsement. The endorsement requires passing a written test AND a TSA background check with fingerprinting.'},
    {k:'Placard rules',q:'When and where must placards be displayed?',a:'Table 1 materials (like explosives 1.1-1.3, poison gas, radioactive Yellow III): ANY amount requires four placards. Table 2 materials (like flammable liquids, corrosives): 1,001 pounds or more requires four placards. Placards go on front, rear, and both sides. Must be 10-3/4 inches square, turned on point (diamond shape), readable from all four directions, kept clean and undamaged.'},
    {k:'Shipping papers',q:'What must you do with hazmat shipping papers?',a:'Keep them separate and identifiable from other papers. While driving: in a door pouch OR within immediate reach while seat belt is fastened. When out of the vehicle: on the driver\'s seat. Emergency responders must be able to find them quickly after a crash. The paper must include an emergency response phone number. Emergency response information must be kept in the same location as the shipping paper.'},
    {k:'Hazmat classes',q:'What are the nine hazard classes with key examples?',a:'Class 1 - Explosives: dynamite, fireworks, ammunition. Class 2 - Gases: propane, oxygen, helium. Class 3 - Flammable Liquids: gasoline, acetone. Class 4 - Flammable Solids: matches, fuses. Class 5 - Oxidizers: ammonium nitrate, hydrogen peroxide. Class 6 - Poisons: pesticides, arsenic. Class 7 - Radioactive: uranium, plutonium. Class 8 - Corrosives: battery acid, hydrochloric acid. Class 9 - Miscellaneous: formaldehyde, asbestos.'},
    {k:'Driver responsibilities',q:'What are the driver\'s hazmat responsibilities?',a:'Verify the shipper has properly identified, marked, and labeled the hazardous materials. Refuse leaking packages and shipments. Placard the vehicle when loading if required. Transport without unnecessary delay. Follow all special rules about transporting hazmat. Keep shipping papers and emergency response information in the proper place at all times.'},
  ]},
};

  {cat:"gk",q:"The distance you should scan ahead in a congested area is about?",opts:["32 feet","One block","Two vehicle lengths ahead"],ans:1,exp:"Good drivers look 12-15 seconds ahead. At lower speeds that's about one block; at highway speeds it's about a quarter mile."},
  {cat:"gk",q:"A vehicle is loaded with very little weight on the drive axle. What may result?",opts:["Poor traction","A need to disconnect the steering axle brakes","Damage to drive axle tires","Better handling"],ans:0,exp:"Too little weight on the driving axles can cause poor traction. The drive wheels may spin easily."},
  {cat:"gk",q:"Truck escape ramps:",opts:["Are designed to protect vehicles from damage","Should not be used unless you have first tried all other ways","Cannot be used by certain types of heavy vehicles"],ans:0,exp:"Escape ramps stop runaway vehicles safely without injuring drivers and passengers. Use one any time brakes fail on a downgrade. No penalty for using one."},
  {cat:"gk",q:"What effects can wet brakes cause?",opts:["Brakes can grab or become weak","Brakes can work better","Your foot can get tired"],ans:0,exp:"Water causes brakes to be weak, apply unevenly, or grab — causing lack of braking power, wheel lockups, pulling to one side, and possible jackknife."},
  {cat:"gk",q:"During pre-trip inspection, make sure that the ___ are secured against snagging, rubbing, or wearing.",opts:["Primary and secondary safety cab locks","Frame and cross members","Air lines and electrical wiring"],ans:2,exp:"Air lines and electrical wiring must be secured against snagging, rubbing, and wearing."},
  {cat:"gk",q:"You have no Hazardous Materials Endorsement. You can drive a vehicle hauling hazardous materials when:",opts:["Someone with the endorsement rides with you","The vehicle does not require placards","The cargo is transported less than 100 miles"],ans:1,exp:"You can haul hazmat without the endorsement only if the vehicle does not require placards. If placards are required, you must have the endorsement."},
  {cat:"gk",q:"Which railroad crossing violations can lead to loss of your CDL for at least 60 days?",opts:["Not having sufficient space to drive all the way through without stopping","Getting stuck on the tracks because of insufficient clearance","Both of the above"],ans:2,exp:"Both failing to have sufficient space to drive completely through AND failing to negotiate a crossing due to insufficient clearance are among the six violations that cost you at least 60 days."},
  {cat:"gk",q:"When should you check your mirrors for a lane change?",opts:["Before and after signaling the change","After starting and after completing the lane change","Both of the above"],ans:2,exp:"Check mirrors: before the change, after signaling, right after starting the change, and after completing the change."},
  {cat:"gk",q:"On which fires can you use the ABC fire extinguisher?",opts:["Electrical fires","Burning tires or cloth","Both of the above"],ans:2,exp:"The ABC type works on electrical fires, burning liquids, wood, paper, and cloth."},
  {cat:"gk",q:"Which of these tells you that cargo contains hazardous materials?",opts:["A hazardous materials placard is on the vehicle","A four-inch diamond-shaped label is on the container","Both of these answers are correct"],ans:2,exp:"Both placards on the vehicle and diamond-shaped labels on containers indicate hazardous materials."},
  {cat:"gk",q:"Which of these statements about speed management is true?",opts:["On packed snow, reduce speed by about 1/2","On a wet road, reduce speed by about 1/3","Both of the above are true"],ans:2,exp:"Wet roads: reduce by 1/3 (55 to 35 mph). Packed snow: reduce by half or more. Ice: reduce to a crawl."},
  {cat:"gk",q:"Which of these is NOT required knowledge for drivers needing a HAZMAT endorsement?",opts:["When to use placards","Basic chemistry","Which products can be loaded together"],ans:1,exp:"Hazmat drivers must know when to use placards and which products can be loaded together. Basic chemistry is not a required knowledge area."},
  {cat:"gk",q:"Which of these statements is true about medicines used to treat the common cold?",opts:["Should only be used when driving during the daytime","Can be used while driving as long as you take half the regular dose","They often make you sleepy and should not be used while driving"],ans:2,exp:"Many over-the-counter cold medicines may make the driver drowsy or otherwise affect safe driving ability."},
  {cat:"gk",q:"Which of these statements is true about other drivers?",opts:["Short-term rental truck drivers are often not used to the limited vision and pose a hazard","Mail or delivery truck drivers do not pose a hazard","Drivers using turn signals can be trusted to turn in the direction indicated"],ans:0,exp:"Rental truck drivers are often not used to the limited vision to the sides and rear of the truck."},
  {cat:"gk",q:"Which of these statements is NOT true about engine belts in hot weather?",opts:["Cracking is likely to occur, but it is not a safety threat","Loose belts will not turn the water pump and/or fan properly","You can check belt tightness by pressing on them"],ans:0,exp:"FALSE — Cracking IS a safety threat. Check belts for cracking or other signs of wear and replace them."},
  {cat:"gk",q:"Which is true about warning other drivers of a stopped vehicle?",opts:["Keep the vehicle's taillights on to warn other drivers","Move the rear reflective triangle back if driver vision is obscured to within 500 feet","Put out your emergency warning devices within five minutes"],ans:1,exp:"If a hill or curve blocks the view, move the rear-most triangle back down the road so warning is provided."},
  {cat:"gk",q:"Which is NOT a good rule when caring for the injured at an accident scene?",opts:["Move severely injured persons if there is danger due to fire or passing traffic","If a qualified person is helping, stay out of the way unless asked to assist","Allow injured persons to become chilled or overheated"],ans:2,exp:"Keep the injured person warm. Do not move a severely injured person unless there is danger of fire or passing traffic."},
  {cat:"gk",q:"Which of the following statements is true?",opts:["Many heavy vehicle accidents occur between midnight and 6 a.m.","Most hazards are more easily seen at night than during the day","Most people are more alert at night than during the day"],ans:0,exp:"Schedule trips for hours you are normally awake when possible. Most people are LESS alert at night."},
  {cat:"gk",q:"Which of these statements is NOT true about bad weather driving conditions?",opts:["When temperature drops, bridges will freeze before roadways","Driving becomes more dangerous as temperature rises to the point where ice begins to melt","As rain continues, the road becomes more slippery than when rain began"],ans:2,exp:"FALSE — As rain continues it washes oil away and traction improves. The road is most slippery just after rain begins."},
  {cat:"gk",q:"What does 'axle weight' mean?",opts:["The weight transmitted to the ground by one axle or one set of axles","The weight transmitted to the tires from the axle","Both of the above"],ans:0,exp:"Axle weight is specifically the weight transmitted from one axle or a set of axles to the ground."},
  {cat:"gk",q:"With a BAC of _____, most people lose consciousness, and some die.",opts:["0.16","0.1","0.4"],ans:2,exp:"At a BAC of .40, most people will lose consciousness and some will die. At .08 driving is legally impaired; at .04 a CDL driver is disqualified."},
  {cat:"gk",q:"Loads that are over-length, over-width, or overweight may require:",opts:["Flashing lights","Driving limited to certain times","Both of the above"],ans:2,exp:"Oversized loads require special permits, may be limited to certain hours, need special equipment (wide load signs, flags, lights), and may need a police escort."},
  {cat:"gk",q:"When getting in to start the engine and inspect inside the cab, you must:",opts:["Start the engine and listen for unusual noises","Make sure the parking brake is on and put the gearshift in neutral (or park if automatic)","Both of the above"],ans:2,exp:"Before starting: confirm parking brake is on and gearshift is in neutral or Park. Then start engine and listen for unusual noises."},
  {cat:"gk",q:"Which of these is NOT something you should do if your headlights are not working properly?",opts:["Adjust the headlights","Leave your high beams on","Clean the headlights"],ans:1,exp:"High beams blind other drivers and must not be left on permanently. Fix headlights properly. Use high beams only when not within 500 feet of another vehicle."},
  {cat:"gk",q:"Name some suspension system defects.",opts:["Leaking shock absorbers","Broken leaves in a leaf spring and a cracked or broken spring hanger","Both of the above"],ans:2,exp:"Leaking shock absorbers and broken or missing leaves in leaf springs are common suspension defects. Also watch for cracked spring hangers and missing U-bolts."},
  {cat:"gk",q:"What is the safest way to use turn signals when you intend to turn?",opts:["Signal well in advance of the turn","Signal continuously up through the turn","Do both of the above"],ans:2,exp:"Signal early, signal continuously throughout the turn, and cancel your signal after the turn is completed."},
  {cat:"gk",q:"Which of these is especially true about your tires in hot weather?",opts:["You should bleed a small amount of air to keep tire pressure steady","You should check tire mounting and air pressure before driving","If a tire is too hot to touch, hose it down with water"],ans:1,exp:"Check pressure every 2 hours or 100 miles in hot weather. Do NOT let air out. If a tire is too hot to touch, stop and wait until it cools."},
  {cat:"gk",q:"What should you do if a car coming toward you at night keeps its high beams on?",opts:["Look toward the right edge of your lane or the right edge of the road","Flash your high beams at the other driver","Slow down and look straight ahead in your lane"],ans:0,exp:"Do not look directly at bright lights. Look at the right side of the road. Do not retaliate with your own high beams."},
  {cat:"gk",q:"When driving in cold weather, your tires must:",opts:["Have at least 4/32-inch tread depth","Have at least 6/32-inch tread depth","Provide enough traction to steer and push the vehicle through snow"],ans:2,exp:"Drive tires must push the rig through snow; steering tires must have traction to steer. More tread is better in winter conditions."},
  {cat:"gk",q:"When driving with few streetlights on a clear night and you cannot see well, you should:",opts:["Find another route that is better lit","Turn your interior lights on","Use your high beams when legal and keep your interior lights off"],ans:2,exp:"Use high beams when safe and legal (not within 500 feet of another vehicle). Interior lights reduce your ability to see outside."},
  {cat:"gk",q:"When a doctor prescribes medication and you know you will be driving, you should:",opts:["Take the medication plus other medications to stay alert","Ask the doctor if the medication will affect your ability to drive","Take the medication but stop if you notice it affecting your driving"],ans:1,exp:"A driver may use prescription medication if the doctor confirms it will not affect safe driving ability."},
  {cat:"gk",q:"What does 'communicating' mean in safe driving?",opts:["Using hand signals","Driving brightly colored vehicles","Letting other drivers know you are there"],ans:2,exp:"Communicate by signaling your intentions, using your horn when needed, using lights, and making sure other drivers are aware of your presence."},
  {cat:"gk",q:"What is the proper way to hold the steering wheel?",opts:["With your right hand on the wheel","Firmly, with one hand at the top and the other at the bottom","Firmly, with both hands on opposite sides of the wheel"],ans:2,exp:"If you hit a curb or pothole, the wheel could pull away from your hands unless you have a firm grip with both hands on opposite sides."},
  {cat:"gk",q:"When inspecting mirrors and windshields for cracks, dirt, and obstructions, you should:",opts:["Not worry about any of it","Look in the mirror to see if you look good","Clean and adjust as necessary"],ans:2,exp:"Inspect mirrors and windshield for cracks, dirt, illegal stickers, or other obstructions to seeing clearly. Clean and adjust as necessary."},
  {cat:"gk",q:"When passing another vehicle, pedestrian, or bicyclist, you should assume they:",opts:["See you","May move into your traffic lane","Will move out of your lane of traffic"],ans:1,exp:"Assume they do not see you and could suddenly move in front of you. Tap horn lightly or flash lights at night."},
  {cat:"gk",q:"If you must stop on a road or shoulder, you must put out your emergency warning devices within:",opts:["Five minutes","Fifteen minutes","Ten minutes"],ans:2,exp:"You must place emergency warning devices within ten minutes of stopping on a road or shoulder."},
  {cat:"gk",q:"Which of these statements is true about trucks, buses, laws and restrictions?",opts:["Federal regulations apply only to trucks driven at least 50 miles on a trip","Laws and restrictions can vary from place to place","County and city laws do not apply to trucks in interstate commerce"],ans:1,exp:"Be familiar with the laws in the states you drive in. Regulations covering vehicle weight, cargo, and routes can vary from one jurisdiction to another."},
  {cat:"gk",q:"To prevent brake fade, you should:",opts:["Coast down hills that are not very steep","Apply constant hard pressure on the brakes","Select a gear that will keep your vehicle at a safe speed on steep downgrades"],ans:2,exp:"Use engine braking as the primary control. Select the correct low gear BEFORE starting down. Brakes are a supplement only."},
  {cat:"gk",q:"You are driving a new truck with a manual transmission on a long steep downhill grade:",opts:["Use a lower gear than you would use to climb the hill","Use the same gear you would use to climb the hill","Shift into neutral and coast"],ans:0,exp:"Modern trucks have low-friction parts and more powerful engines. They can climb in higher gears but may need lower gears going down than going up."},
  {cat:"gk",q:"Which of the following is true about a vehicle with a high center of gravity?",opts:["The cargo should be rearranged so heaviest parts are under the lightest parts","The vehicle is less likely to tip over","The vehicle is less dangerous on curves"],ans:0,exp:"A high center of gravity makes the vehicle MORE likely to tip over. Load cargo as low as possible with heaviest items on the bottom."},
  {cat:"gk",q:"One can recognize hazardous materials by looking at the container's:",opts:["Shape","Color","Label"],ans:2,exp:"Look for the four-inch diamond-shaped hazardous materials label on the container. Proper shipping name, identification number, label, and placards must all be correct."},
  {cat:"gk",q:"Optional safety equipment may include emergency phone numbers, tire chains, and:",opts:["Warning devices","A charged fire extinguisher","Tire changing equipment"],ans:2,exp:"Optional items include chains, tire changing equipment, emergency phone numbers, and an accident reporting kit. Warning devices and a fire extinguisher are REQUIRED, not optional."},
  {cat:"gk",q:"The best way to stop all skids is to:",opts:["Use stab or controlled braking","Counter steer and accelerate","Restore traction to the tires"],ans:2,exp:"When any vehicle starts to skid, you must act to restore traction to the wheels."},
  {cat:"gk",q:"If your brakes get wet on a rainy day, what can result?",opts:["Reduced braking power","Excessive brake wear","Hydroplaning"],ans:0,exp:"Wet brakes can be weak, apply unevenly, or grab — causing lack of braking power, wheel lockups, pulling to one side, and jackknife if you pull a trailer."},
  {cat:"gk",q:"Implied consent means that when you operate a CMV on public roads, you:",opts:["Consent to be tested for alcohol in your blood","Understand that you may now drink alcohol before driving","Consent to have your vehicle inspected for alcohol"],ans:0,exp:"If you operate a CMV, you are deemed to have given your consent to alcohol testing."},
  {cat:"gk",q:"It takes the body about _____ hours to get rid of the alcohol in four drinks.",opts:["6","2","4"],ans:2,exp:"The liver processes about one-third of an ounce of alcohol per hour. Four standard drinks take approximately 4 hours to process. Only time sobers you up."},
  {cat:"gk",q:"Heavy vehicles must sometimes travel more slowly than other traffic. Which is NOT a good rule to follow?",opts:["Turn on your flashers if it is legal to do so","Stay to the right","Signal other drivers when it is safe for them to pass you"],ans:2,exp:"Do NOT signal other drivers to pass. You could cause an accident and be blamed. Stay right and use flashers instead."}
];

function switchTab(t){document.querySelectorAll('.nav-btn').forEach((b,i)=>b.classList.toggle('active',['fc','sg','qz'][i]===t));document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));document.getElementById('sec-'+t).classList.add('active');if(t==='fc')renderFC();if(t==='sg')renderSG();if(t==='qz')qzStart();}
function fcFilter(){const c=document.getElementById('fc-cat').value;fcBaseDeck=CARDS.filter(x=>c==='all'||x.cat===c);resetDeck();}
function resetDeck(){fcDeck=[...fcBaseDeck];for(let i=fcDeck.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[fcDeck[i],fcDeck[j]]=[fcDeck[j],fcDeck[i]];}fcIdx=0;fcKnow=new Set();fcDontKnow=new Set();showRound=false;document.getElementById('fc-round-end').style.display='none';document.getElementById('fc-nav-row').style.display='flex';renderFC();}
function fcShuffle(){for(let i=fcDeck.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[fcDeck[i],fcDeck[j]]=[fcDeck[j],fcDeck[i]];}fcIdx=0;renderFC();}
function fcMove(d){if(showRound)return;document.getElementById('fc-card').classList.remove('flipped');fcIdx=(fcIdx+d+fcDeck.length)%fcDeck.length;setTimeout(renderFC,160);}
function flipCard(){if(showRound)return;document.getElementById('fc-card').classList.toggle('flipped');}
function vote(knew){const card=fcDeck[fcIdx];if(knew){fcKnow.add(card.q);fcDontKnow.delete(card.q);}else{fcDontKnow.add(card.q);fcKnow.delete(card.q);}updatePills();const isLast=fcIdx>=fcDeck.length-1;document.getElementById('fc-card').classList.remove('flipped');if(isLast){showRoundEnd();}else{fcIdx++;setTimeout(renderFC,160);}}
function updatePills(){const total=fcBaseDeck.length;const kn=fcKnow.size;const dk=fcDontKnow.size;const unseen=total-kn-dk;document.getElementById('fc-know-n').textContent=kn;document.getElementById('fc-dontknow-n').textContent=dk;document.getElementById('fc-unseen-n').textContent=Math.max(0,unseen);}
function showRoundEnd(){showRound=true;const kn=fcKnow.size;const dk=fcDontKnow.size;const total=fcBaseDeck.length;document.getElementById('fc-round-end').style.display='block';document.getElementById('fc-nav-row').style.display='none';document.getElementById('fc-vote-row').style.display='none';const perfect=dk===0;document.getElementById('fc-round-end').innerHTML=`<div class="fc-round-title">${perfect?'Perfect round!':'Round complete'}</div><div class="fc-round-sub">${kn} of ${total} marked <strong>Know it</strong>&nbsp;&nbsp;&bull;&nbsp;&nbsp;${dk} marked <strong>Don't know</strong>${perfect?'<br>You know every card in this deck!':''}</div><div class="fc-round-btns">${dk>0?`<button class="fc-round-btn primary" onclick="retryMissed()">&#10007; Retry ${dk} missed card${dk===1?'':'s'}</button>`:''}<button class="fc-round-btn" onclick="resetDeck()">&#8635; Start over (${total} cards)</button></div>`;}
function retryMissed(){const missed=fcBaseDeck.filter(c=>fcDontKnow.has(c.q));fcDeck=[...missed];fcIdx=0;fcKnow=new Set();fcDontKnow=new Set();showRound=false;document.getElementById('fc-round-end').style.display='none';document.getElementById('fc-nav-row').style.display='flex';renderFC();}
function renderFC(){if(!fcDeck.length){resetDeck();return;}const c=fcDeck[fcIdx];document.getElementById('fc-q').textContent=c.q;document.getElementById('fc-a').textContent=c.a;document.getElementById('fc-count').textContent=(fcIdx+1)+' / '+fcDeck.length;document.getElementById('fc-prog').style.width=((fcIdx+1)/fcDeck.length*100)+'%';document.getElementById('fc-card').classList.remove('flipped');updatePills();}
var sgCat='control',qzPool=[],qzIdx=0,qzScore=0,qzAnswered=false;

function switchTab(t){document.querySelectorAll('.nav-btn').forEach((b,i)=>b.classList.toggle('active',['fc','sg','qz'][i]===t));document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));document.getElementById('sec-'+t).classList.add('active');if(t==='fc')renderFC();if(t==='sg')renderSG();if(t==='qz')qzStart();}
function renderSG(){document.getElementById('sg-toc').innerHTML=Object.keys(GUIDE).map(k=>`<button class="sg-toc-btn${k===sgCat?' active':''}" onclick="sgSwitch('${k}')">${GUIDE[k].title}</button>`).join('');const g=GUIDE[sgCat];document.getElementById('sg-content').innerHTML=`<div class="sg-title">${g.title}</div>`+g.items.map(i=>`<div class="sg-item"><span class="sg-key">${i.k}</span><div class="sg-q">${i.q}</div><div class="sg-a">${i.a}</div></div>`).join('');}
function sgSwitch(k){sgCat=k;renderSG();}
function qzStart(){const c=document.getElementById('qz-cat').value;qzPool=QUIZ.filter(q=>c==='all'||q.cat===c);for(let i=qzPool.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[qzPool[i],qzPool[j]]=[qzPool[j],qzPool[i]];}if(c==='all')qzPool=qzPool.slice(0,20);qzIdx=0;qzScore=0;qzAnswered=false;renderQ();}
function renderQ(){if(qzIdx>=qzPool.length){showResult();return;}const q=qzPool[qzIdx];document.getElementById('qz-area').innerHTML=`<div class="quiz-header"><span class="quiz-meta">Question ${qzIdx+1} of ${qzPool.length}</span><span class="quiz-meta">Score: ${qzScore}</span></div><div class="progress-bar"><div class="progress-fill" style="width:${qzIdx/qzPool.length*100}%"></div></div><div class="quiz-question">${q.q}</div><div class="quiz-opts">${q.opts.map((o,i)=>`<button class="quiz-opt" onclick="answerQ(${i})">${o}</button>`).join('')}</div><div id="qz-exp" class="quiz-explain"></div><button id="qz-next" class="quiz-next" onclick="nextQ()">Next question &rarr;</button>`;}
function answerQ(idx){if(qzAnswered)return;qzAnswered=true;const q=qzPool[qzIdx];document.querySelectorAll('.quiz-opt').forEach((b,i)=>{b.disabled=true;if(i===q.ans)b.classList.add('correct');else if(i===idx)b.classList.add('wrong');});if(idx===q.ans)qzScore++;const e=document.getElementById('qz-exp');e.style.display='block';e.textContent=q.exp;document.getElementById('qz-next').style.display='inline-block';}
function nextQ(){qzIdx++;qzAnswered=false;renderQ();}
function showResult(){const pct=Math.round(qzScore/qzPool.length*100);const pass=pct>=80;document.getElementById('qz-area').innerHTML=`<div class="quiz-result"><div class="quiz-big-score" style="color:${pass?'var(--success-text)':'var(--danger-text)'}">${pct}%</div><div class="quiz-result-label">${qzScore} of ${qzPool.length} correct &mdash; ${pass?'Passing score!':pct>=70?'Close - review weak areas and try again.':'Keep studying!'}</div><button class="quiz-restart" onclick="qzStart()">&#8646; Try again</button></div>`;}

var fcBaseDeck=[...CARDS],fcDeck=[],fcIdx=0,fcKnow=new Set(),fcDontKnow=new Set(),showRound=false;
fcBaseDeck=[...CARDS];resetDeck();renderSG();
</script>
